<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.2</title>

    <link rel="stylesheet" href="../Exercise-1.2/node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Bootstrap Button Group</h2>

    <div class="btn-group mb-5">

        <button class="btn btn-primary">Home</button>
        <button class="btn btn-success">About</button>
        <button class="btn btn-danger">Contact</button>

    </div>

    <h2 class="mb-4">Toggle Buttons</h2>

    <div class="btn-group" role="group">

        <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
        <label class="btn btn-outline-primary" for="check1">HTML</label>

        <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
        <label class="btn btn-outline-success" for="check2">CSS</label>

        <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
        <label class="btn btn-outline-danger" for="check3">Bootstrap</label>

    </div>

</div>

<script src="../Exercise-1.2/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
