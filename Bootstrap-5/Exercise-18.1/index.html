<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercise 18.1</title>


    <link rel="stylesheet"
    href="../Exercise-1.2/node_modules/bootstrap/dist/css/bootstrap.min.css">

</head>


<body>


<div class="container mt-5 text-center">


    <h2 class="mb-4">
        Bootstrap Modal Example
    </h2>


    <button class="btn btn-primary"
    data-bs-toggle="modal"
    data-bs-target="#exampleModal">

        Open Modal

    </button>



    <div class="modal fade" id="exampleModal">


        <div class="modal-dialog">


            <div class="modal-content">


                <div class="modal-header">

                    <h5 class="modal-title">
                        Welcome
                    </h5>

                    <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                    </button>

                </div>



                <div class="modal-body">

                    This is a Bootstrap 5 Modal Popup.

                </div>



                <div class="modal-footer">

                    <button class="btn btn-secondary"
                    data-bs-dismiss="modal">

                        Close

                    </button>

                </div>


            </div>


        </div>


    </div>


</div>



<script src="../Exercise-1.2/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
