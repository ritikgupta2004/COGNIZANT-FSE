<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercise 18.2</title>


    <link rel="stylesheet"
    href="../Exercise-1.2/node_modules/bootstrap/dist/css/bootstrap.min.css">

</head>


<body>


<div class="container mt-5">


    <h2 class="text-center mb-4">
        Bootstrap Accordion Example
    </h2>



    <div class="accordion" id="accordionExample">



        <div class="accordion-item">


            <h2 class="accordion-header">


                <button class="accordion-button"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseOne">

                    What is Bootstrap?

                </button>


            </h2>



            <div id="collapseOne"
            class="accordion-collapse collapse show"
            data-bs-parent="#accordionExample">


                <div class="accordion-body">

                    Bootstrap is a popular CSS framework used for creating responsive websites quickly.

                </div>


            </div>


        </div>





        <div class="accordion-item">


            <h2 class="accordion-header">


                <button class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseTwo">

                    What is Bootstrap 5?

                </button>


            </h2>



            <div id="collapseTwo"
            class="accordion-collapse collapse"
            data-bs-parent="#accordionExample">


                <div class="accordion-body">

                    Bootstrap 5 is the latest version with improved components and JavaScript features.

                </div>


            </div>


        </div>





        <div class="accordion-item">


            <h2 class="accordion-header">


                <button class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseThree">

                    Why use Bootstrap?

                </button>


            </h2>



            <div id="collapseThree"
            class="accordion-collapse collapse"
            data-bs-parent="#accordionExample">


                <div class="accordion-body">

                    It helps developers build responsive and modern web pages faster.

                </div>


            </div>


        </div>



    </div>


</div>



<script src="../Exercise-1.2/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
