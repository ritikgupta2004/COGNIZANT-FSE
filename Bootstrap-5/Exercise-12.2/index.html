<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2</title>

    <link rel="stylesheet" href="../Exercise-1.2/node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-5">Pricing Plans</h2>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card text-center shadow p-3">

                <div class="card-body">

                    <h3 class="card-title">Basic</h3>

                    <h4 class="text-primary">₹499/month</h4>

                    <p class="card-text">
                        5 Projects<br>
                        10 GB Storage<br>
                        Email Support
                    </p>

                    <button class="btn btn-primary">
                        Choose Plan
                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center shadow p-3 border-primary">

                <div class="card-body">

                    <h3 class="card-title">Standard</h3>

                    <h4 class="text-success">₹999/month</h4>

                    <p class="card-text">
                        20 Projects<br>
                        50 GB Storage<br>
                        Priority Support
                    </p>

                    <button class="btn btn-success">
                        Choose Plan
                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center shadow p-3">

                <div class="card-body">

                    <h3 class="card-title">Premium</h3>

                    <h4 class="text-danger">₹1499/month</h4>

                    <p class="card-text">
                        Unlimited Projects<br>
                        100 GB Storage<br>
                        24/7 Support
                    </p>

                    <button class="btn btn-danger">
                        Choose Plan
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
